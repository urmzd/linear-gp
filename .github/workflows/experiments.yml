name: Experiments

on:
  workflow_dispatch:
    inputs:
      experiment_type:
        description: "Type of experiment to run"
        required: true
        type: choice
        options:
          - baseline
          - experiments
      iterations:
        description: "Number of experiment iterations"
        required: false
        default: "10"
  workflow_call:
    inputs:
      experiment_type:
        description: "Type of experiment to run"
        required: false
        type: string
        default: "experiments"
      iterations:
        description: "Number of experiment iterations"
        required: false
        type: string
        default: "10"

jobs:
  experiment:
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: 1
      RUST_LOG: warn
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Run baseline
        if: inputs.experiment_type == 'baseline'
        run: cargo run -p lgp-cli --release -- experiment iris_baseline --skip-search

      - name: Run experiments
        if: inputs.experiment_type == 'experiments'
        run: cargo run -p lgp-cli --release -- experiment --skip-search -n ${{ inputs.iterations }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "experiment-${{ github.run_id }}"
          path: "outputs"
